<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />

  <title>ECHO_OFF</title>
  <meta name="description" content="ECHO_OFF PWA - Secure Communications System" />

  <!-- PWA -->
  <link rel="manifest" href="manifest.json" />
  <meta name="theme-color" content="#e9e9e9" />
  <meta name="color-scheme" content="light dark" />

  <!-- Icons (si existen, no afecta si faltan) -->
  <link rel="icon" href="icon-192.png" />
  <link rel="apple-touch-icon" href="icon-192.png" />

  <!-- ===============================
       CACHE-BUSTING (IMPORTANTE)
       Cambia V= cada vez que quieras forzar actualización visual
       Recomiendo: usar fecha/hora corta
       =============================== -->
  <link rel="stylesheet" href="style.css?v=20260207_01" />
  <link rel="stylesheet" href="theme.clean.css?v=20260207_01" />

  <!-- Fallback visible si por algún motivo no carga el CSS -->
  <style>
    /* Esto NO toca tu UI, solo evita pantalla blanca en caso extremo */
    html, body { height: 100%; margin: 0; }
    body { font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif; }
  </style>
</head>

<body>
  <!-- =========================================================
       PEGA AQUÍ TU <BODY> ACTUAL (tal cual lo tienes hoy)
       - Copia desde tu index.html actual: todo lo que está dentro de <body>...</body>
       - Pégalo aquí reemplazando este comentario.
       ========================================================= -->

  <!-- EJEMPLO (NO lo uses si tu app ya tiene body):
  <div id="app" class="app"></div>
  -->

  <!-- =========================================================
       SW REGISTRATION + FORCE UPDATE (SEGURO / IDEMPOTENTE)
       - No rompe tu app.
       - Si ya tienes registro de SW en app.js, esto NO interfiere:
         solo intenta update y enlaza el botón "Forzar Actualización".
       ========================================================= -->
  <script>
    (function () {
      // 1) Registrar Service Worker (si existe)
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', async () => {
          try {
            const reg = await navigator.serviceWorker.register('./sw.js');
            // Intentar traer update apenas cargue (no rompe)
            try { await reg.update(); } catch (e) {}
          } catch (e) {
            // Silencioso: no afectamos funcionalidad si SW falla.
          }
        });
      }

      // 2) Enlazar botón "Forzar Actualización" (si existe en tu UI)
      //    IMPORTANTE: NO asumimos IDs exactas: buscamos por texto.
      function findForceUpdateButton() {
        const buttons = Array.from(document.querySelectorAll('button, a, div'));
        const targetText = 'forzar actualización';
        return buttons.find(el => (el.textContent || '').trim().toLowerCase().includes(targetText));
      }

      async function forceUpdateNow() {
        try {
          if (!('serviceWorker' in navigator)) { location.reload(); return; }

          const reg = await navigator.serviceWorker.getRegistration();
          if (reg) {
            try { await reg.update(); } catch (e) {}

            // Si hay SW esperando, lo activamos ya
            if (reg.waiting) {
              try { reg.waiting.postMessage({ type: 'SKIP_WAITING' }); } catch (e) {}
            }

            // Si hay controlador activo, pedimos limpieza (tu SW lo soporta)
            if (navigator.serviceWorker.controller) {
              try { navigator.serviceWorker.controller.postMessage({ type: 'CLEAR_CACHES' }); } catch (e) {}
            }
          }

          // Recarga “dura”
          location.reload();
        } catch (e) {
          location.reload();
        }
      }

      // Esperar a que tu UI esté montada (por app.js) y luego enganchar el botón
      window.addEventListener('load', () => {
        let tries = 0;
        const t = setInterval(() => {
          tries++;
          const btn = findForceUpdateButton();
          if (btn && !btn.dataset.forceUpdateBound) {
            btn.dataset.forceUpdateBound = '1';
            btn.addEventListener('click', (ev) => {
              ev.preventDefault();
              forceUpdateNow();
            }, { passive: false });
            clearInterval(t);
          }
          if (tries > 40) clearInterval(t); // ~10s, no insistimos más
        }, 250);
      });
    })();
  </script>

  <!-- Tu JS principal (si ya lo tenías, déjalo igual) -->
  <script src="app.js?v=20260207_01"></script>
</body>
</html>
