<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KRONX Licencias - Panel de Administración</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        body { 
            font-family: 'Inter', sans-serif; 
            background: #0b141a; 
            color: #e9edef; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            justify-content: center; 
            height: 100vh; 
            margin: 0; 
        }
        .container {
            background: #202c33;
            padding: 40px;
            border-radius: 16px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            text-align: center;
            max-width: 400px;
            width: 100%;
            border: 1px solid #2a3942;
        }
        h2 { margin-top: 0; color: #f5a623; }
        input { 
            width: 100%; 
            padding: 12px; 
            margin: 10px 0 20px 0; 
            border-radius: 8px; 
            border: none; 
            background: #2a3942; 
            color: white; 
            font-size: 16px; 
            box-sizing: border-box;
            outline: none;
        }
        input:focus { box-shadow: 0 0 0 2px #f5a623; }
        button { 
            width: 100%; 
            background: #f5a623; 
            color: #000; 
            border: none; 
            padding: 14px; 
            font-size: 16px; 
            font-weight: bold; 
            border-radius: 8px; 
            cursor: pointer; 
            transition: 0.2s;
        }
        button:hover { background: #e09612; }
        #output { 
            margin-top: 25px; 
            background: #111b21; 
            padding: 15px; 
            border-radius: 8px; 
            display: none;
            font-size: 14px;
        }
        .code-box {
            font-size: 24px;
            font-family: monospace;
            background: #2a3942;
            padding: 15px;
            border-radius: 8px;
            color: #53bdeb;
            letter-spacing: 2px;
            margin: 15px 0;
            user-select: all;
        }
        .link { color: #53bdeb; text-decoration: none; font-weight: bold; display:block; margin: 10px 0; }
        .copy-btn { 
            background: #2a3942; color: white; padding: 6px 12px; font-size: 12px; margin-top:10px; width:auto;
        }
    </style>
</head>
<body>

    <div class="container">
        <h2>🛠️ Panel Maestro KRONX</h2>
        <p style="font-size:14px; color:#8696a0; margin-bottom: 25px;">Genera un enlace mágico para dar acceso a un cliente. Nunca compartas publicamente esta página.</p>
        
        <label for="days" style="display:block; text-align:left; font-size:13px; color:#8696a0;">Duración de la Licencia (Días):</label>
        <input type="number" id="days" placeholder="Ej: 30" value="30" />

        <button onclick="generate()">Generar Licencia VIP</button>

        <div id="output">
            <p style="color:#f5a623; margin-top:0;">Plantilla lista para Enviar por WhatsApp:</p>
            <textarea id="res-message" readonly style="width:100%; height:190px; background:#2a3942; color:#53bdeb; border:none; border-radius:8px; padding:15px; font-family:monospace; font-size:13px; resize:none;"></textarea>
            
            <p style="font-size:12px; color:#8696a0; margin-top: 15px;">Vencimiento estimado: <span id="res-date" style="color:#e9edef;"></span></p>
            <button class="copy-btn" style="background:#53bdeb; color:#000; font-weight:bold; width:100%; padding:10px;" onclick="copyMessage()">Copiar Instrucciones Automáticamente</button>
        </div>

        <a href="index.html" target="_blank" style="display:block; text-align:center; margin-top:30px; color:#8696a0; text-decoration:none; font-size:14px; transition:color 0.2s;" onmouseover="this.style.color='#f5a623'" onmouseout="this.style.color='#8696a0'">
            ⮐ Abrir Plataforma KRONX (index.html)
        </a>
    </div>

    <script>
        // Multiplicadores matemáticos únicos (nunca cambies esto o las licencias preexistentes se invalidarán)
        const SECRET_A = 191;
        const SECRET_B = 8923;

        function generate() {
            const days = parseInt(document.getElementById('days').value);
            if(isNaN(days) || days <= 0) return alert("Ingresa días válidos");

            // Cálculo matemático en lugar de Base64
            const limitMilis = Date.now() + (days * 24 * 60 * 60 * 1000);
            const expDay = Math.floor(limitMilis / 86400000);
            
            const hexExp = expDay.toString(16).toUpperCase().padStart(4, '0');
            const sigNum = (expDay * SECRET_A + SECRET_B) % 65536;
            const hexSig = sigNum.toString(16).toUpperCase().padStart(4, '0');
            
            const finalCode = `KX-${hexExp}-${hexSig}`; 
            
            // Lógica mágica de 2 clicks: Genera enlace automáticamente si está subido a internet
            let whatsappText = '';
            
            if (window.location.protocol !== 'file:') {
                let linkUrl = window.location.origin + window.location.pathname.replace('keygen-secret.html', 'index.html') + `?vip=${finalCode}`;
                whatsappText = `🛡️ ACCESO KRONX VIP 🛡️\n\nAbre este enlace para activar automáticamente tu modo Anfitrión:\n\n${linkUrl}\n\nPasos:\n1. Toca el enlace.\n2. Presiona "Nueva Conversación".\n3. Envía el código de sala generado a tu chica o invitado.`;
            } else {
                whatsappText = `🛡️ ACCESO KRONX VIP 🛡️\n\nTu Clave de Acceso Secreta:\n${finalCode}\n\nPasos:\n1. Entra a la aplicación KRONX.\n2. Presiona "Nueva Conversación".\n3. Ingresa tu Clave y listo.\n4. Envía el código de sala generado a tu invitado.`;
            }

            document.getElementById('output').style.display = 'block';
            document.getElementById('res-message').value = whatsappText;
            document.getElementById('res-date').textContent = new Date(limitMilis).toLocaleString();
        }

        function copyMessage() {
            const copyText = document.getElementById('res-message');
            copyText.select();
            copyText.setSelectionRange(0, 99999); // Para moviles
            navigator.clipboard.writeText(copyText.value);
            alert("¡Mensaje Copiado!\n\nPégalo en WhatsApp o Telegram. Tu cliente entenderá exactamente qué debe hacer y con qué código.");
        }
    </script>
</body>
</html>
